<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل | لمة رمضان</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg-deep: #050a15;
      --bg-primary: #0c1425;
      --bg-card: #162035;
      --gold: #e8b931;
      --gold-light: #f5d976;
      --text-primary: #f0e6d3;
      --text-secondary: #9ca3af;
      --danger: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Background Pattern */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(232, 185, 49, 0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      background: linear-gradient(135deg, rgba(22, 32, 53, 0.9) 0%, rgba(26, 40, 69, 0.7) 100%);
      border: 1px solid rgba(232, 185, 49, 0.15);
      border-radius: 24px;
      padding: 50px 40px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .icon-wrapper {
      width: 110px;
      height: 110px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      position: relative;
      animation: pulse 2s infinite ease-in-out;
    }

    .icon-wrapper i {
      font-size: 3.5rem;
      color: var(--danger);
      position: relative;
      z-index: 2;
    }

    .icon-wrapper::after {
      content: '';
      position: absolute;
      width: 130%;
      height: 4px;
      background: var(--danger);
      transform: rotate(-45deg);
      border-radius: 2px;
      opacity: 0.8;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 900;
      margin-bottom: 15px;
      background: linear-gradient(135deg, var(--text-primary), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 35px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 16px;
      border: none;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      color: var(--bg-deep);
      box-shadow: 0 8px 24px rgba(232, 185, 49, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(232, 185, 49, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid rgba(232, 185, 49, 0.3);
      color: var(--gold);
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: rgba(232, 185, 49, 0.1);
    }

    .footer-text {
      margin-top: 30px;
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 40px 25px;
      }
      h1 { font-size: 1.6rem; }
      .icon-wrapper { width: 90px; height: 90px; }
      .icon-wrapper i { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon-wrapper">
      <i class="fas fa-wifi"></i>
    </div>
    
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>
      يبدو أنك تفقد اتصالك بالشبكة حالياً.<br>
      تحقق من اتصالك بالواي فاي أو بيانات الهاتف وحاول مرة أخرى.
    </p>

    <button class="btn btn-primary" onclick="retryConnection()">
      <i class="fas fa-rotate-right"></i>
      <span>إعادة المحاولة</span>
    </button>

    <button class="btn btn-secondary" onclick="window.location.href='index.html'">
      <i class="fas fa-home"></i>
      <span>العودة للرئيسية</span>
    </button>

    <div class="footer-text">
      لمة رمضان 2026
    </div>
  </div>

  <script>
    // دالة إعادة المحاولة
    function retryConnection() {
      const btn = document.querySelector('.btn-primary');
      const originalContent = btn.innerHTML;
      
      // تغيير حالة الزر لتحميل
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
      btn.style.pointerEvents = 'none';

      setTimeout(() => {
        if (navigator.onLine) {
          // إذا عاد النت، نحدث الصفحة
          window.location.reload();
        } else {
          // إذا لا يزال مقطوعاً، نعيد الزر لحالته
          btn.innerHTML = originalContent;
          btn.style.pointerEvents = 'auto';
          
          // رسالة تنبيه إضافية
          const container = document.querySelector('.container');
          const errorMsg = document.createElement('div');
          errorMsg.textContent = '⚠️ لا يزال الاتصال غير متاح';
          errorMsg.style.cssText = 'margin-top: 15px; color: #fbbf24; font-size: 0.9rem; animation: fadeIn 0.3s;';
          container.appendChild(errorMsg);
          
          setTimeout(() => errorMsg.remove(), 3000);
        }
      }, 1500);
    }

    // تحسس عودة الاتصال تلقائياً
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
